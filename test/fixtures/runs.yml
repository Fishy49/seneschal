active_run:
  workflow: deploy
  pipeline_task: running_task
  status: running
  started_at: <%= 5.minutes.ago %>
  context: {}
  input: {}

completed_run:
  workflow: deploy
  pipeline_task: completed_task
  status: completed
  started_at: <%= 1.hour.ago %>
  finished_at: <%= 30.minutes.ago %>
  context: {}
  input: {}

failed_run:
  workflow: deploy
  status: failed
  started_at: <%= 2.hours.ago %>
  finished_at: <%= 1.hour.ago %>
  error_message: "Step 'Run Build' failed with exit code 1"
  context: {}
  input: {}

pending_run:
  workflow: deploy
  status: pending
  context: {}
  input: {}

todo_run:
  workflow: deploy
  status: completed
  started_at: <%= 2.hours.ago %>
  finished_at: <%= 90.minutes.ago %>
  context: {}
  input: {}
